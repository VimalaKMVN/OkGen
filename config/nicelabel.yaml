# Folder NiceLabel watches for incoming OK files. "Send to NiceLabel" copies
# the selected files here, overwriting any file of the same name. Edit to match
# your setup. (Windows paths: use double backslashes or forward slashes.)
nicelabel_path: "D:\\NiceLabel\\TJX GTA\\Automation\\Incoming"

# Shown in the confirmation dialog before sending. Remind operators to verify
# the right NiceLabel trigger(s) are running. Edit to name your actual triggers.
warning: "Make sure the correct NiceLabel trigger(s) are STARTED / turned ON in NiceLabel Automation before sending."

# Playful status lines that rotate under the send animation while files are
# in flight. Add/remove freely. Leave empty or omit to use the built-in set.
quips:
  - "Beaming labels to NiceLabel…"
  - "Folding the OK files neatly…"
  - "Greasing the conveyor belt…"
  - "Waking up the print triggers…"
  - "Stamping fresh barcodes…"
  - "Loading the delivery truck…"
  - "Sprinkling magic toner…"
  - "Negotiating with the printer…"
  - "Aligning the perforations…"
  - "Routing through the hot folder…"
  - "Counting the cartons…"
  - "Polishing the price tags…"
  - "Teleporting to the DC…"
  - "Warming up the label rollers…"
  - "Convincing NiceLabel to cooperate…"
  - "Untangling the ribbon…"
  - "Double-checking the SKUs…"
  - "Lining up the carton labels…"

# Celebratory line shown once the send succeeds (one is picked at random).
done_quips:
  - "Off to the printers! 🎉"
  - "Labels are on their way!"
  - "NiceLabel has the ball now."
  - "Delivered to the hot folder!"
  - "Wheels up — bon voyage! ✈️"
  - "Cartons loaded and rolling."
