# Saved rename patterns. Pick a preset in the Bulk Rename panel to fill in ALL
# the parts at once (then tweak if you like) instead of adding parts one by one.
#
# Each preset has:
#   name       -> shown in the preset dropdown
#   separator  -> how the parts are joined ("_", "-", ".", "" for none)
#   parts      -> ordered list. Each entry is one of:
#                   * a TOKEN NAME  (a custom token from rename_tokens.yaml,
#                                    a derived token, or a header field)
#                   * {text: "..."} for inline literal text
#                   * no_delim      a "glue" marker: the parts on either side
#                                   join with NO separator (everything else
#                                   still uses `separator`). {glue: true} works too.
#
# Easy to edit — add/remove presets and reorder parts freely.
presets:
  - name: "Brand · Layout · Key"
    separator: "_"
    parts: [brand, layout, key]

  - name: "FMT + Format + Keytrol"
    separator: "_"
    parts: [FMT, format, KEY, keytrol]

  - name: "Dept + Key"
    separator: "_"
    parts: [DEPT, dept, KEY, key]

  - name: "Chain Format Key (no separator)"
    separator: ""
    parts: [chain, format, key]

  # Glue example: FMT joins directly to the format value, the rest use "_".
  #   -> Homegoods_FMTA_550000.OK
  - name: "FMT glued to format"
    separator: "_"
    parts: [brand, FMT, no_delim, format, keytrol]

  # Labelled full tag, e.g.
  #   Homegoods_StyleHeader_FMT_A_T_2_D_78_CP_000000_CU_N_RP_002099.OK
  # (custom label token, then its header value, repeated)
  - name: "Labelled full tag (StyleHeader)"
    separator: "_"
    parts:
      - brand          # Homegoods
      - layout         # StyleHeader
      - FMT            # label "FMT"
      - format         #   value A
      - KEY
      - keytrol
      - suffix
      - T              # label "T"
      - type           #   value 2
      - DEPT           # label "DEPT"
      - dept           #   value 78
      - CP             # label "CP"
      - comp_price     #   value 000000
      - CU             # label "CU"
      - comp_up        #   value N
      - RP             # label "RP"
      - ret_price      #   value 002099
