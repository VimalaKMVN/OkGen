<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OkGen Editor</title>
  <link rel="icon" type="image/png" sizes="180x180" href="{{ url_for('static', filename='favicon.png') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img id="brandLogo" class="brand-logo" src="{{ url_for('static', filename='logo.svg') }}"
           alt="TJX" onerror="this.style.display='none'" />
      <span class="brand-text">OkGen</span>
    </div>
    <input id="folderPath" class="folder-input" type="text"
           placeholder="Folder path (or click Open Folder to browse)…" />
    <button id="openBtn" class="btn">Open Folder…</button>
    <div class="spacer"></div>
    <button id="bulkBtn" class="btn hidden">Bulk Edit</button>
    <span id="fileTitle" class="file-title"></span>
    <button id="saveBtn" class="btn btn-primary" disabled>Save</button>
    <button id="saveAsBtn" class="btn" disabled>Save As…</button>
    <span id="status" class="status"></span>
  </header>

  <main class="layout">
    <aside id="treePane" class="tree-pane">
      <div class="pane-title">Files<span id="selCount" class="sel-count"></span></div>
      <div id="tree" class="tree"></div>
    </aside>
    <div id="dragbar" class="dragbar" title="Drag to resize the file panel"></div>
    <section id="editorPane" class="editor-pane">
      <div id="editorEmpty" class="empty">Open a folder and pick an .OK file to edit.</div>
      <div id="editorTabs" class="tabs hidden">
        <button id="tabRendered" class="tab active" type="button">Rendered (edit)</button>
        <button id="tabRaw" class="tab" type="button">Raw file (verify)</button>
      </div>
      <div id="editor" class="editor"></div>
      <div id="rawView" class="raw-view hidden"></div>
      <div id="bulkPanel" class="bulk hidden"></div>
      <div id="renamePanel" class="bulk hidden"></div>
    </section>
  </main>

  <div id="activity" class="hidden"></div>
  <div id="ctxMenu" class="ctx-menu hidden"></div>

  <script>
    window.OKGEN_CHAINS = {{ chains | tojson }};
    window.OKGEN_FIELD_COLORS = {{ field_colors | tojson }};
    window.OKGEN_NICELABEL = {{ nicelabel_path | tojson }};
    window.OKGEN_NICELABEL_WARNING = {{ nicelabel_warning | tojson }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
